# HyperDrive ゲートウェイ
#
# ブラウザから見える唯一の入口。同一オリジンにすることで
# - REST: client.ts が baseUrl '' (same-origin) で動く
# - WS  : watchword.ts の本番パス（常に same-origin）が動く
# を両立させる。nitro の /v1 プロキシは WS upgrade が保証されないため
# ここで振り分ける。
#
# upstream ブロックではなく変数 + Docker 内蔵 DNS (127.0.0.11) を使い、
# 起動順やコンテナ再作成で IP が変わっても名前解決が追従するようにしている。

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    # WS upgrade 用
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 大きいファイルのアップロードを許可
    client_max_body_size 0;

    server {
        listen 8080;

        # API（REST + WebSocket）
        location /v1/ {
            set $api_upstream http://api:3400;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;  # WS シグナリングの長時間接続
            proxy_send_timeout 3600s;
        }

        # フロントエンド（SSR）
        location / {
            set $web_upstream http://web:3000;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
